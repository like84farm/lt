<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GPT 对话</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f4f5f7; color: #111827; }
    button, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    .app { display: grid; grid-template-columns: 292px 1fr; height: 100vh; }
    .sidebar { display: flex; flex-direction: column; gap: 12px; min-width: 0; padding: 14px 12px; border-right: 1px solid #e5e7eb; background: #f7f8fa; }
    .sidebar-header { display: flex; flex-direction: column; gap: 10px; }
    .new-chat { height: 42px; border-radius: 12px; background: #111827; color: #fff; font-weight: 700; }
    .search-wrap { position: relative; }
    .search-wrap::before { content: ""; position: absolute; left: 14px; top: 50%; width: 13px; height: 13px; border: 2px solid #8a8f98; border-radius: 50%; transform: translateY(-55%); }
    .search-wrap::after { content: ""; position: absolute; left: 26px; top: 24px; width: 8px; height: 2px; border-radius: 999px; background: #8a8f98; transform: rotate(45deg); transform-origin: left center; }
    .session-search { width: 100%; height: 42px; padding: 0 14px 0 40px; border: 0; border-radius: 999px; outline: none; background: #eef0f2; color: #111827; font: inherit; }
    .session-search::placeholder { color: #8a8f98; }
    .session-search:focus { background: #fff; box-shadow: 0 0 0 3px rgba(37, 99, 235, .12); }
    .sessions { flex: 1; min-height: 0; overflow-y: auto; padding-right: 2px; }
    .session-group { margin-bottom: 16px; }
    .session-group-title { margin: 12px 8px 8px; color: #8a8f98; font-size: 14px; font-weight: 700; }
    .session { width: 100%; margin-bottom: 4px; padding: 11px 10px; border-radius: 12px; background: transparent; color: #111827; text-align: left; }
    .session:hover { background: #eef1f5; }
    .session.active { background: #e8f0ff; color: #1d4ed8; }
    .session-title { display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 15px; font-weight: 500; }
    .session-time { display: block; margin-top: 4px; color: #8a8f98; font-size: 12px; }
    .session-empty { padding: 18px 8px; color: #8a8f98; font-size: 14px; text-align: center; }
    .sidebar-footer { padding-top: 8px; border-top: 1px solid #e5e7eb; }
    .delete-chat { width: 100%; height: 38px; border-radius: 10px; background: #fee2e2; color: #b91c1c; font-weight: 700; }
    .sidebar-overlay { display: none; }
    .chat { display: grid; grid-template-rows: auto 1fr auto; min-width: 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid #e5e7eb; background: #fff; }
    .topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .topbar h1 { margin: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 18px; }
    .sidebar-toggle { display: none; padding: 8px 12px; border-radius: 9px; background: #f3f4f6; color: #111827; font-weight: 700; }
    .messages { overflow-y: auto; padding: 20px; }
    .empty { max-width: 520px; margin: 18vh auto 0; color: #6b7280; text-align: center; line-height: 1.6; }
    .msg { display: flex; margin-bottom: 14px; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .bubble { max-width: min(760px, 78%); padding: 11px 13px; border-radius: 14px; line-height: 1.6; white-space: pre-wrap; overflow-wrap: anywhere; }
    .user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .assistant .bubble { background: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
    .composer { padding: 14px 18px; border-top: 1px solid #e5e7eb; background: #fff; }
    .composer-box { display: flex; gap: 10px; align-items: flex-end; }
    #prompt { flex: 1; min-height: 44px; max-height: 150px; padding: 11px 12px; resize: none; border: 1px solid #d1d5db; border-radius: 12px; outline: none; line-height: 1.45; }
    #prompt:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .12); }
    .send { width: 72px; height: 44px; border-radius: 12px; background: #2563eb; color: #fff; font-weight: 700; }
    .send:disabled { opacity: .55; cursor: not-allowed; }

    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 30;
        width: min(84vw, 320px);
        transform: translateX(0);
        transition: transform .2s ease;
        box-shadow: 20px 0 40px rgba(15, 23, 42, .18);
      }
      .sidebar.closed { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; position: fixed; inset: 0; z-index: 20; background: rgba(15, 23, 42, .28); }
      .sidebar-overlay.hidden { display: none; }
      .topbar { padding: 12px; }
      .sidebar-toggle { display: inline-flex; align-items: center; }
      .messages { padding: 14px 12px; }
      .bubble { max-width: 86%; }
      .composer { padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <button id="newChat" class="new-chat">新建对话</button>
        <div class="search-wrap">
          <input id="sessionSearch" class="session-search" type="search" placeholder="搜索聊天内容..." />
        </div>
      </div>
      <div id="sessionList" class="sessions"></div>
      <div class="sidebar-footer">
        <button id="deleteChat" class="delete-chat">删除当前对话</button>
      </div>
    </aside>
    <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

    <section class="chat">
      <header class="topbar">
        <div class="topbar-left">
          <button id="toggleSidebar" class="sidebar-toggle" type="button">菜单</button>
          <h1 id="chatTitle">新对话</h1>
        </div>
      </header>

      <div id="messages" class="messages"></div>

      <form id="composer" class="composer">
        <div class="composer-box">
          <textarea id="prompt" rows="1" placeholder="输入消息..."></textarea>
          <button id="send" class="send" type="submit">发送</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    const CONFIG = { baseUrl: '/api' };
    const STORAGE_KEY = 'gpt-chat.sessions.v1';

    const els = {
      sidebar: document.getElementById('sidebar'),
      sidebarOverlay: document.getElementById('sidebarOverlay'),
      toggleSidebar: document.getElementById('toggleSidebar'),
      newChat: document.getElementById('newChat'),
      deleteChat: document.getElementById('deleteChat'),
      sessionSearch: document.getElementById('sessionSearch'),
      sessionList: document.getElementById('sessionList'),
      chatTitle: document.getElementById('chatTitle'),
      messages: document.getElementById('messages'),
      composer: document.getElementById('composer'),
      prompt: document.getElementById('prompt'),
      send: document.getElementById('send')
    };

    let sessions = loadSessions();
    let activeId = sessions[0]?.id || createSession(false).id;
    let sending = false;
    let sessionSearch = '';

    bindEvents();
    renderAll();

    function bindEvents() {
      els.newChat.addEventListener('click', startNewChat);
      els.toggleSidebar.addEventListener('click', openSidebar);
      els.sidebarOverlay.addEventListener('click', closeSidebar);
      els.deleteChat.addEventListener('click', deleteCurrentSession);
      els.sessionSearch.addEventListener('input', () => {
        sessionSearch = els.sessionSearch.value.trim().toLowerCase();
        renderSessions();
      });
      els.composer.addEventListener('submit', async (event) => {
        event.preventDefault();
        const text = els.prompt.value.trim();
        if (!text || sending) return;
        await sendMessage(text);
      });
      els.prompt.addEventListener('input', autoResizePrompt);
      els.prompt.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          els.composer.requestSubmit();
        }
      });
    }

    function loadSessions() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSessions() {
      sessions.sort((a, b) => b.updatedAt - a.updatedAt);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function createSession(save = true) {
      const now = Date.now();
      const session = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(now) + Math.random().toString(16).slice(2),
        title: '新对话',
        createdAt: now,
        updatedAt: now,
        messages: []
      };
      sessions.unshift(session);
      if (save) saveSessions();
      return session;
    }

    function getActiveSession() {
      return sessions.find((session) => session.id === activeId) || sessions[0];
    }

    function startNewChat() {
      sessionSearch = '';
      els.sessionSearch.value = '';
      activeId = createSession(true).id;
      renderAll();
      closeSidebar();
      els.prompt.focus();
    }

    function openSidebar() {
      els.sidebar.classList.remove('closed');
      els.sidebar.classList.add('open');
      els.sidebarOverlay.classList.remove('hidden');
    }

    function closeSidebar() {
      els.sidebar.classList.add('closed');
      els.sidebar.classList.remove('open');
      els.sidebarOverlay.classList.add('hidden');
    }

    function renderAll() {
      saveSessions();
      renderTitle();
      renderMessages();
      renderSessions();
    }

    function renderTitle() {
      const session = getActiveSession();
      els.chatTitle.textContent = session?.title || '新对话';
    }

    function renderMessages() {
      const session = getActiveSession();
      els.messages.innerHTML = '';
      if (!session || !session.messages.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '开始一个新对话，聊天记录会自动保存在本机浏览器。';
        els.messages.appendChild(empty);
        return;
      }
      for (const message of session.messages) {
        els.messages.appendChild(createMessageNode(message.role, message.content));
      }
      scrollBottom();
    }

    function createMessageNode(role, content) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      wrap.appendChild(bubble);
      return wrap;
    }

    function renderSessions() {
      els.sessionList.innerHTML = '';
      const filtered = getFilteredSessions();

      if (!filtered.length) {
        const empty = document.createElement('div');
        empty.className = 'session-empty';
        empty.textContent = sessionSearch ? '没有找到相关对话' : '暂无历史对话';
        els.sessionList.appendChild(empty);
        return;
      }

      for (const group of groupSessions(filtered)) {
        const section = document.createElement('section');
        section.className = 'session-group';

        const title = document.createElement('div');
        title.className = 'session-group-title';
        title.textContent = group.label;
        section.appendChild(title);

        for (const session of group.items) {
          section.appendChild(createSessionButton(session));
        }

        els.sessionList.appendChild(section);
      }
    }

    function createSessionButton(session) {
      const btn = document.createElement('button');
      btn.className = `session ${session.id === activeId ? 'active' : ''}`;
      btn.innerHTML = '<span class="session-title"></span><span class="session-time"></span>';
      btn.querySelector('.session-title').textContent = session.title || '新对话';
      btn.querySelector('.session-time').textContent = formatTime(session.updatedAt);
      btn.addEventListener('click', () => {
        activeId = session.id;
        renderAll();
        closeSidebar();
        els.prompt.focus();
      });
      return btn;
    }

    function getFilteredSessions() {
      if (!sessionSearch) return sessions;

      return sessions.filter((session) => {
        const title = (session.title || '').toLowerCase();
        const messages = (session.messages || [])
          .map((message) => message.content || '')
          .join(' ')
          .toLowerCase();
        return title.includes(sessionSearch) || messages.includes(sessionSearch);
      });
    }

    function groupSessions(list) {
      const groups = [
        { label: '今天', items: [] },
        { label: '昨天', items: [] },
        { label: '7天内', items: [] },
        { label: '更早', items: [] }
      ];

      for (const session of list) {
        groups[getSessionGroupIndex(session.updatedAt)].items.push(session);
      }

      return groups.filter((group) => group.items.length);
    }

    function getSessionGroupIndex(time) {
      const timestamp = Number(time) || 0;
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const startOfYesterday = startOfToday - 24 * 60 * 60 * 1000;
      const startOfSevenDaysAgo = startOfToday - 6 * 24 * 60 * 60 * 1000;

      if (timestamp >= startOfToday) return 0;
      if (timestamp >= startOfYesterday) return 1;
      if (timestamp >= startOfSevenDaysAgo) return 2;
      return 3;
    }

    async function sendMessage(text) {
      const session = getActiveSession();
      session.messages.push({ role: 'user', content: text });
      if (session.title === '新对话') session.title = text.slice(0, 20) || '新对话';
      session.updatedAt = Date.now();
      els.prompt.value = '';
      els.prompt.style.height = 'auto';
      setSending(true);
      renderAll();
      const replyNode = addAssistantMessage('');
      const replyBubble = replyNode.querySelector('.bubble');
      let reply = '';

      try {
        await callApi(session.messages, (chunk) => {
          reply += chunk;
          replyBubble.textContent = reply;
          scrollBottom();
        });
        if (!reply) replyBubble.textContent = '没有收到回复。';
        session.messages.push({ role: 'assistant', content: reply || '没有收到回复。' });
      } catch (error) {
        const message = `请求失败：${error.message}`;
        replyBubble.textContent = message;
        session.messages.push({ role: 'assistant', content: message });
      } finally {
        session.updatedAt = Date.now();
        saveSessions();
        setSending(false);
        renderAll();
      }
    }

    function addAssistantMessage(text) {
      const node = createMessageNode('assistant', text);
      els.messages.appendChild(node);
      scrollBottom();
      return node;
    }

    async function callApi(messages, onChunk) {
      const url = CONFIG.baseUrl.replace(/\/$/, '') + '/chat';
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: messages.map(({ role, content }) => ({ role, content })) })
      });
      if (!response.ok) {
        const raw = await response.text();
        let data = null;
        try { data = raw ? JSON.parse(raw) : null; } catch { data = raw; }
        throw new Error(extractError(data) || `${response.status} ${response.statusText}`);
      }
      if (!response.body) throw new Error('浏览器不支持流式读取。');

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        if (chunk) onChunk(chunk);
      }
      const rest = decoder.decode();
      if (rest) onChunk(rest);
    }

    function extractError(data) {
      if (!data) return '';
      if (typeof data === 'string') return data;
      return data.error?.message || data.message || data.detail || '';
    }

    function deleteCurrentSession() {
      if (!confirm('确定删除当前对话吗？')) return;
      sessions = sessions.filter((session) => session.id !== activeId);
      if (!sessions.length) createSession(false);
      activeId = sessions[0].id;
      saveSessions();
      renderAll();
    }

    function setSending(value) {
      sending = value;
      els.send.disabled = value;
      els.prompt.disabled = value;
    }

    function autoResizePrompt() {
      els.prompt.style.height = 'auto';
      els.prompt.style.height = Math.min(150, els.prompt.scrollHeight) + 'px';
    }

    function scrollBottom() {
      requestAnimationFrame(() => {
        els.messages.scrollTop = els.messages.scrollHeight;
      });
    }

    function formatTime(time) {
      const date = new Date(time);
      const now = new Date();
      return date.toDateString() === now.toDateString()
        ? date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
        : date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
    }
  </script>
</body>
</html>
